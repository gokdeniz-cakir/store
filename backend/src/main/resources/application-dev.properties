server.port=${SERVER_PORT:8080}

spring.datasource.url=${AURELIA_DB_URL:jdbc:postgresql://localhost:5432/aurelia_editions}
spring.datasource.username=${AURELIA_DB_USERNAME:aurelia_user}
spring.datasource.password=${AURELIA_DB_PASSWORD:change-me}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initialization-fail-timeout=${AURELIA_DB_INIT_FAIL_TIMEOUT:-1}
spring.datasource.hikari.connection-timeout=2000

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

spring.flyway.enabled=${AURELIA_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

app.cors.allowed-origins=${AURELIA_ALLOWED_ORIGINS:http://localhost:5173}
