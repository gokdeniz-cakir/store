server.port=${SERVER_PORT:8080}

spring.datasource.url=${AURELIA_DB_URL:jdbc:postgresql://localhost:5432/aurelia_editions}
spring.datasource.username=${AURELIA_DB_USERNAME:aurelia_user}
spring.datasource.password=${AURELIA_DB_PASSWORD:change-me}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initialization-fail-timeout=${AURELIA_DB_INIT_FAIL_TIMEOUT:-1}
spring.datasource.hikari.connection-timeout=${AURELIA_DB_CONNECTION_TIMEOUT_MS:15000}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=${AURELIA_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

app.cors.allowed-origins=${AURELIA_ALLOWED_ORIGINS:http://localhost:5173}

jwt.secret=${JWT_SECRET:abcdefghijklmnopqrstuvwxyz123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.mail.host=${AURELIA_SMTP_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${AURELIA_SMTP_PORT:2525}
spring.mail.username=${AURELIA_SMTP_USERNAME:}
spring.mail.password=${AURELIA_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${AURELIA_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${AURELIA_SMTP_STARTTLS_ENABLE:true}

app.mail.enabled=${AURELIA_MAIL_ENABLED:false}
app.mail.from=${AURELIA_MAIL_FROM:no-reply@aurelia.local}

app.auth.rate-limit.max-attempts=${AURELIA_AUTH_RATE_LIMIT_MAX_ATTEMPTS:5}
app.auth.rate-limit.window-seconds=${AURELIA_AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
